###############################################################################
# Minty-I3 i3status Configuration
# Linux Mint Dark Theme
###############################################################################

general {
    colors = true
    interval = 1
    color_good = "#87cf3e"
    color_degraded = "#f39c12"
    color_bad = "#e74c3c"
}

order += "battery 0"
order += "wireless _first_"
order += "ethernet _first_"
order += "cpu_temperature 0"
order += "cpu_usage"
order += "memory"
order += "disk /"
order += "volume master"
order += "tztime local"

wireless _first_ {
    format_up = "W: (%quality at %essid) %ip"
    format_down = "W: down"
    color_up = "#ffffff"
    color_down = "#888888"
}

ethernet _first_ {
    format_up = "E: %ip (%speed)"
    format_down = "E: down"
    color_up = "#ffffff"
    color_down = "#888888"
}

battery 0 {
    format = "%status %percentage %remaining"
    format_down = "Battery: down"
    status_chr = "⚡"
    status_bat = "🔋"
    status_full = "☻"
    path = "/sys/class/power_supply/BAT%d/uevent"
    low_threshold = 10
    threshold_type = percentage
    color_good = "#107c10"
    color_bad = "#d13438"
}

cpu_temperature 0 {
    format = "T: %degrees°C"
    path = "/sys/class/thermal/thermal_zone0/temp"
    max_threshold = 80
}

cpu_usage {
    format = "CPU: %usage"
}

memory {
    format = "MEM: %used / %total"
    threshold_degraded = "1G"
    format_degraded = "MEMORY: %free"
}

disk "/" {
    format = "ROOT: %free"
}

volume master {
    format = "VOL: %volume"
    format_muted = "VOL: muted"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "%Y-%m-%d %H:%M:%S"
}
