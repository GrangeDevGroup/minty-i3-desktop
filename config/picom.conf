###############################################################################
# Minty-I3 Picom Configuration
###############################################################################

# Shadow
shadow = true;
shadow-radius = 8;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.5;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

# Window opacity
inactive-opacity = 0.9;
active-opacity = 1.0;
frame-opacity = 0.9;
inactive-opacity-override = false;

# Blur (picom 9+ syntax)
blur-method = "gaussian";
blur-size = 7;
blur-deviation = 5.0;

# Rounded corners
corner-radius = 0;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'utility'"
];

# Backend
backend = "glx";
vsync = true;

# GLX settings
glx-no-stencil = true;
xrender-sync-fence = true;
use-damage = true;

# Window type settings
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};

# Exclude conditions
shadow-exclude = [
  "name = 'Notification'",
  "window_type = 'dock'",
  "window_type = 'utility'",
  "_NET_WM_WINDOW_TYPE:a = 'dialog'",
  "_GTK_FRAME_EXTENTS@:c"
];

fade-exclude = [
  "window_type = 'dock'",
  "window_type = 'utility'"
];

# Transparency rules for terminal windows
opacity-rule = [
  "90:class_i = 'URxvt'",
  "90:class_i = 'XTerm'",
  "90:class_i = 'Terminator'",
  "90:class_i = 'xfce4-terminal'"
];
